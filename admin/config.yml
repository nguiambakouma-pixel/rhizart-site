# ============================================
# RHIZART — Decap CMS Config
# Authentification via GitHub OAuth
# ============================================

backend:
  name: github
  repo: nguiambakouma-pixel/rhizart-site
  branch: main
  base_url: https://api.netlify.com
  auth_endpoint: auth

media_folder: "images/uploads"
public_folder: "/images/uploads"

locale: fr

collections:

  - name: "projets"
    label: "Projets Portfolio"
    label_singular: "Projet"
    folder: "_projets"
    create: true
    slug: "{{slug}}"
    identifier_field: titre
    summary: "{{titre}} — {{categorie}}"
    fields:
      - { label: "Titre", name: "titre", widget: "string" }
      - label: "Catégorie"
        name: "categorie"
        widget: "select"
        options:
          - { label: "Branding", value: "branding" }
          - { label: "Print", value: "print" }
          - { label: "Motion", value: "motion" }
          - { label: "Illustration", value: "illustration" }
          - { label: "Réseaux sociaux", value: "social" }
          - { label: "Packaging", value: "packaging" }
      - { label: "Description courte", name: "description", widget: "text" }
      - { label: "Image principale", name: "image", widget: "image" }
      - { label: "Client", name: "client", widget: "string", required: false }
      - { label: "Année", name: "annee", widget: "number", default: 2025 }
      - { label: "Durée", name: "duree", widget: "string", required: false }
      - label: "Outils / Technologies"
        name: "outils"
        widget: "list"
        required: false
        field: { label: "Outil", name: "outil", widget: "string" }
      - { label: "Résultat clé", name: "resultat", widget: "string", required: false }
      - { label: "Lien (si en ligne)", name: "lien", widget: "string", required: false }
      - { label: "Description complète", name: "contenu", widget: "markdown", required: false }
      - { label: "Publié", name: "publie", widget: "boolean", default: true }

  - name: "equipe"
    label: "Équipe"
    label_singular: "Membre"
    folder: "_equipe"
    create: true
    slug: "{{slug}}"
    identifier_field: nom
    fields:
      - { label: "Nom", name: "nom", widget: "string" }
      - { label: "Rôle", name: "role", widget: "string" }
      - { label: "Photo", name: "photo", widget: "image" }
      - { label: "Biographie", name: "bio", widget: "text" }
      - label: "Compétences"
        name: "competences"
        widget: "list"
        field: { label: "Compétence", name: "comp", widget: "string" }
      - { label: "Est fondateur ?", name: "fondateur", widget: "boolean", default: false }
      - { label: "LinkedIn", name: "linkedin", widget: "string", required: false }
      - { label: "Instagram", name: "instagram", widget: "string", required: false }
      - { label: "Ordre", name: "ordre", widget: "number", default: 1 }

  - name: "temoignages"
    label: "Témoignages"
    label_singular: "Témoignage"
    folder: "_temoignages"
    create: true
    slug: "{{slug}}"
    identifier_field: nom
    fields:
      - { label: "Nom", name: "nom", widget: "string" }
      - { label: "Rôle / Entreprise", name: "role", widget: "string" }
      - { label: "Citation", name: "citation", widget: "text" }
      - { label: "Note (1-5)", name: "note", widget: "number", default: 5, min: 1, max: 5 }
      - { label: "Mis en avant ?", name: "featured", widget: "boolean", default: false }
      - { label: "Publié", name: "publie", widget: "boolean", default: true }

  - name: "parametres"
    label: "Paramètres"
    files:
      - label: "Infos générales"
        name: "general"
        file: "_data/general.yml"
        fields:
          - { label: "Email", name: "email", widget: "string" }
          - { label: "WhatsApp", name: "whatsapp", widget: "string" }
          - { label: "Adresse", name: "adresse", widget: "string" }
          - { label: "Horaires", name: "horaires", widget: "string" }
          - { label: "Instagram", name: "instagram", widget: "string", required: false }
          - { label: "Facebook", name: "facebook", widget: "string", required: false }
